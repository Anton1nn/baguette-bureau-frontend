<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion WhatsApp - Baguette & Bureau</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #faf7f0;
      --primary: #b8860b;
      --txt: #3a3422;
      --error: #b82020;
      --white: #fff;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--txt);
    }
    body, .center-container {
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
    }
    .center-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .title {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .instruction {
      font-size: 1.1rem;
      margin-bottom: 32px;
      text-align: center;
    }
    .qrcode {
      width: 210px;
      height: 210px;
      background: var(--white);
      border: 2px solid var(--primary);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(184,134,11,0.05);
      object-fit: contain;
      margin-bottom: 30px;
      display: block;
    }
    .loader {
      width: 44px;
      height: 44px;
      border: 5px solid #f4e6cb;
      border-radius: 50%;
      border-top: 5px solid var(--primary);
      animation: spin 1s linear infinite;
      margin-bottom: 50px;
      margin-top: 11px;
    }
    @keyframes spin {
      to { transform: rotate(360deg);}
    }
    .error-msg {
      color: var(--error);
      background: #fff5f3;
      border: 1px solid #fad3d3;
      border-radius: 8px;
      padding: 12px 24px 11px 24px;
      font-size: 1.08rem;
      margin-bottom: 30px;
      text-align: center;
    }
    .btn {
      background: var(--primary);
      color: var(--bg);
      font-size: 1.13rem;
      font-weight: 600;
      padding: 13px 36px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      letter-spacing: 0.2px;
      box-shadow: 0 2px 8px rgba(184,134,11,0.04);
    }
    .btn:hover,
    .btn:focus {
      background: #a17608;
      transform: scale(1.036);
      outline: none;
      color: var(--white);
    }
    .btn:disabled {
      background: #e3c988;
      color: #fffbe8;
      cursor: not-allowed;
    }
    @media (max-width: 600px) {
      .center-container {
        padding: 18px 6vw;
      }
      .title { font-size: 1.3rem; }
      .instruction { font-size: 1rem; }
      .qrcode { width: 150px; height: 150px; }
      .btn { width: 100%; font-size: 1.08rem; }
    }
  </style>
</head>
<body>
  <div class="center-container">
    <div class="title">Connectez votre WhatsApp</div>
    <div class="instruction">
      Scannez ce QR code avec votre WhatsApp pour connecter votre numéro
    </div>
    <div id="qrcode-container">
      <div class="loader" id="loader"></div>
    </div>
    <div class="error-msg" id="error-msg" style="display:none;"></div>
    <button class="btn" id="connect-btn" style="margin-top:9px;" disabled>C’est connecté&nbsp;!</button>
  </div>
  <script>
    const qrContainer = document.getElementById('qrcode-container');
    const errorMsg = document.getElementById('error-msg');
    const btn = document.getElementById('connect-btn');
    const loader = document.getElementById('loader');

    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, function (m) {
        return ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        })[m];
      });
    }

    async function loadQrCode() {
      errorMsg.style.display = 'none';
      btn.disabled = true;
      if (loader) loader.style.display = 'block';

      const jwt = localStorage.getItem('jwt_token');
      if (!jwt) {
        qrContainer.innerHTML = '';
        errorMsg.textContent = "Impossible de générer le QR code, veuillez réessayer plus tard.";
        errorMsg.style.display = 'block';
        return;
      }
      try {
        const res = await fetch(
          "https://baguette-bureau-backend.onrender.com/whatsapp/qrcode",
          { method: "GET", headers: { "Authorization": `Bearer ${jwt}` } }
        );
        if (!res.ok) {
          throw new Error();
        }
        const data = await res.json();
        if (data && data.qrcode) {
          qrContainer.innerHTML = `<img src="data:image/png;base64,${escapeHTML(data.qrcode)}" alt="QR WhatsApp" class="qrcode">`;
          btn.disabled = false;
        } else {
          throw new Error();
        }
      } catch (e) {
        qrContainer.innerHTML = '';
        errorMsg.textContent = "Impossible de générer le QR code, veuillez réessayer plus tard.";
        errorMsg.style.display = 'block';
        btn.disabled = true;
      }
    }

    btn.addEventListener('click', () => {
      window.location.href = "dashboard.html";
    });

    window.onload = loadQrCode;
  </script>
</body>
</html>
