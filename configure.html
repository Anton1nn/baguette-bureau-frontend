<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configuration WhatsApp - Baguette & Bureau</title>
  <style>
    :root {
      --creme: #faf7f0;
      --gold: #b8860b;
      --grey: #554e36;
      --border: #e4dcc0;
    }
    body {
      min-height: 100vh;
      background: var(--creme);
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--grey);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(184,134,11,0.07);
      padding: 36px 32px 30px 32px;
      max-width: 370px;
      text-align: center;
      margin: 32px 0;
    }
    .title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .instructions {
      font-size: 1.09rem;
      margin-bottom: 26px;
      color: var(--grey);
    }
    .qrcode-wrapper {
      margin: 0 auto 20px auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 260px;
      justify-content: center;
    }
    .qrcode-img {
      border-radius: 12px;
      border: 2.5px solid var(--gold);
      background: #fffbe8;
      width: 200px;
      height: 200px;
      object-fit: contain;
      box-shadow: 0 2px 8px rgba(184,134,11,0.04);
      margin-bottom: 7px;
      display: block;
    }
    .loader {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 5px solid #fffbe8;
      border-top: 5px solid var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 9px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      margin-top: 5px;
      color: #b82020;
      background: #fff5f3;
      border: 1px solid #fad3d3;
      border-radius: 8px;
      font-size: 1rem;
      padding: 10px 0 7px 0;
      min-height: 22px;
    }
    .btn {
      margin-top: 23px;
      width: 100%;
      background: var(--gold);
      color: var(--creme);
      border: none;
      border-radius: 25px;
      font-size: 1.08rem;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(184,134,11,0.04);
      transition: background 0.16s, transform 0.10s;
      letter-spacing: 0.2px;
    }
    .btn:disabled {
      background: #e5c87a;
      cursor: not-allowed;
    }
    .btn:hover, .btn:focus {
      background: #a17608;
      color: #fff;
      outline: none;
      transform: translateY(-1px) scale(1.02);
    }
    @media (max-width: 500px) {
      .container {
        max-width: 95vw;
        padding: 24px 3vw 20px 3vw;
      }
      .qrcode-img {
        width: 150px;
        height: 150px;
      }
      .qrcode-wrapper {
        height: 180px;
      }
      .title {
        font-size: 1.17rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Bienvenue sur Baguette &amp; Bureau !</div>
    <div class="instructions">
      Scannez le QR code ci-dessous pour connecter votre numéro WhatsApp à l'application.
    </div>
    <div class="qrcode-wrapper" id="qrcode-wrapper">
      <div class="loader" id="loader"></div>
    </div>
    <div class="error" id="error"></div>
    <button class="btn" id="connectedBtn" disabled>C’est connecté&nbsp;!</button>
  </div>
  <script>
    const qrcodeWrapper = document.getElementById('qrcode-wrapper');
    const errorDiv = document.getElementById('error');
    const btn = document.getElementById('connectedBtn');
    const loader = document.getElementById('loader');

    function escapeHTML(s) {
      return s.replace(/[&<>"']/g, function(m) {
        return ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        })[m];
      });
    }

    async function fetchQrCode() {
      errorDiv.textContent = '';
      btn.disabled = true;

      const token = localStorage.getItem('jwt_token');
      if (!token) {
        showError('Non authentifié : veuillez vous reconnecter.');
        loader?.remove();
        return;
      }
      try {
        const response = await fetch('https://baguette-bureau-backend.onrender.com/whatsapp/qrcode', {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        if (!response.ok) {
          loader?.remove();
          let msg = 'Échec lors de la récupération du QR code.';
          try {
            const data = await response.json();
            if (data && data.error) msg = data.error;
            else if(data && data.message) msg = data.message;
          } catch(e) {}
          showError(msg);
          return;
        }
        const data = await response.json();

        if (!data || !data.qrcode) {
          loader?.remove();
          showError('Le QR code est indisponible pour le moment.');
          return;
        }

        // Insert QR code image
        const img = document.createElement('img');
        img.className = 'qrcode-img';
        img.src = `data:image/png;base64,${escapeHTML(data.qrcode)}`;
        img.alt = 'QR code WhatsApp';
        // Clean previous (loader), then show image
        qrcodeWrapper.innerHTML = '';
        qrcodeWrapper.appendChild(img);
        btn.disabled = false;
      } catch (e) {
        loader?.remove();
        showError('Impossible de rejoindre le serveur pour obtenir le QR code.');
      }
    }

    function showError(msg) {
      errorDiv.textContent = msg;
      btn.disabled = true;
      qrcodeWrapper.innerHTML = '';
    }

    btn.addEventListener('click', function() {
      window.location.href = 'dashboard.html';
    });

    fetchQrCode();
  </script>
</body>
</html>
